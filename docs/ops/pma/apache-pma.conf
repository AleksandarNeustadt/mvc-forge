<VirtualHost 172.21.8.95:8080>
    ServerName pma.aleksandar.pro
    DocumentRoot /usr/share/phpmyadmin

    <Directory /usr/share/phpmyadmin>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/pma_error.log
    CustomLog ${APACHE_LOG_DIR}/pma_access.log combined
</VirtualHost>

<VirtualHost 172.21.8.95:8443>
    ServerName pma.aleksandar.pro
    DocumentRoot /usr/share/phpmyadmin

    <Directory /usr/share/phpmyadmin>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        SSLRequireSSL
    </Directory>

    SSLEngine on
    SSLVerifyClient none
    SSLCertificateFile /path/to/ssl/aleksandar.pro.crt
    SSLCertificateKeyFile /path/to/ssl/aleksandar.pro.key
    SSLCertificateChainFile /path/to/ssl/aleksandar.pro.ca

    ErrorLog ${APACHE_LOG_DIR}/pma_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/pma_ssl_access.log combined
</VirtualHost>
